<div class="container d-flex justify-content-center align-items-center" style="min-height: 40vh">
  <div class="card shadow p-3" style="width: 65%; background-color: antiquewhite">
    <form class="mt-3" [formGroup]="editForm" (ngSubmit)="updateTask()">
      <div>
        <label for="name" class="form-label fw-bold">Task Name: </label>
        <input type="text" class="form-control" formControlName="name">
      </div>
      <div class="mt-3">
        <label for="name" class="form-label fw-bold">Task Description: </label>
        <textarea type="text" rows="4" class="form-control" formControlName="description"></textarea>
      </div>
      <div class="mt-3 d-flex justify-content-between">
        <button class="btn btn-dark" type="submit">Edit</button>
        <button class="btn btn-dark" (click)="goBack()">Back</button>
      </div>
    </form>
  </div>
</div>
