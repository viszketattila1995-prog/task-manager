
<div class="container d-flex justify-content-center align-items-center" style="min-height: 90vh">

  <div class="container mt-3 align-items-center" style="width: 40%">
    <h2 class="mt-4 fw-bold">Bejelentkezés</h2>

    <form class="mt-3" [formGroup]="loginForm" (ngSubmit)="login()">
      <div>
      <label for="username" class="form-label fw-bold">Felhasználónév: </label>
        <input type="text" class="form-control" formControlName="username">
      </div>
      <div class="mt-3">
        <label for="password" class="form-label fw-bold">Jelszó:</label>
        <input type="password" class="form-control" formControlName="password">
      </div>
      <div class="mt-3">
        <button type="submit" class="btn btn-dark" [disabled]="loginForm.invalid">Bejelentkezés</button>
      </div>

    </form>
    <div class="mt-5"></div>
  </div>

</div>
